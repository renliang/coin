proxy:
  https: "http://127.0.0.1:7897"

scanner:
  max_market_cap: 100000000    # 市值上限（美元），默认1亿
  window_min_days: 7           # 检测窗口最小天数
  window_max_days: 14          # 检测窗口最大天数
  volume_ratio: 0.5            # 缩量阈值（后期量/前期量）
  drop_min: 0.05               # 最小跌幅 5%
  drop_max: 0.15               # 最大跌幅 15%
  max_daily_change: 0.05       # 单日最大涨跌幅 5%
  max_coins: 99999             # 不限制币种数（全量）
  max_pages: 100               # 不限制翻页数（全量）
  page_delay: 30               # CoinGecko每页间隔秒数
  skip_market_cap_filter: true  # 暂时跳过市值过滤（CoinGecko限速中）
  top_n: 20                    # 输出前N个结果

signal:
  min_score: 0.6               # 最低评分门槛（回测验证：高分组3d胜率69%）
  hold_days: 3                 # 建议持仓天数（回测验证：3d最优）
  stop_loss: 0.05              # 止损比例 5%
  take_profit: 0.08            # 止盈比例 8%
  confirmation: true              # 是否启用确认层
  confirmation_min_pass: 3        # 4项中至少通过几项

# 新币观察清单（--mode new）；与 accumulation 扫描器参数独立
# 条数少≠bug：只统计 Binance U本位永续∩Binance 现货，并套上下面天数/成交额/排除规则；top_n 是输出上限。
new_coin:
  max_listing_days: 30         # Binance 现货首根日K起算，上架天数上限
  min_quote_volume_24h: 500000 # 24h USDT 成交额下限
  min_avg_volume_7d: 0         # 近7日日均 quote 额下限，0=不启用
  exclude_leverage_tokens: true
  exclude_stable_bases: true
  max_market_cap_usd: 0        # 0=不限制；>0 时在排序后按市值过滤（CoinGecko）
  sort_by: listing_age_asc    # listing_age_asc | volume_24h_desc
  top_n: 50
  enrich_market_cap: true
  enrich_avg_volume_7d: true
  coingecko_page_delay: 8
  request_delay: 0.08          # Binance 请求间隔（秒）

# 新币 L2 增强：公告匹配 / DexScreener 链上池 / 规则尽调分（--mode new；可用 --no-intel 关闭）
listing_intel:
  enabled: true
  l2a_binance_announcements: true
  l2b_dexscreener: true
  l2c_dd_score: true
  l2a_catalog_id: 48
  l2a_page_size: 50
  l2a_max_pages: 2
  request_delay: 0.35
  dexscreener_delay: 0.35
  manual_overlay_csv: null      # 例如 overlays/listing_notes.csv
  trust_tier_high_min: 75
  trust_tier_mid_min: 55
