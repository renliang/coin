proxy:
  https: "http://127.0.0.1:7897"

scanner:
  max_market_cap: 100000000    # 市值上限（美元），默认1亿
  window_min_days: 7           # 检测窗口最小天数
  window_max_days: 14          # 检测窗口最大天数
  volume_ratio: 0.5            # 缩量阈值（后期量/前期量）
  drop_min: 0.05               # 最小跌幅 5%
  drop_max: 0.15               # 最大跌幅 15%
  max_daily_change: 0.05       # 单日最大涨跌幅 5%
  max_coins: 99999             # 不限制币种数（全量）
  max_pages: 100               # 不限制翻页数（全量）
  page_delay: 30               # CoinGecko每页间隔秒数
  skip_market_cap_filter: true  # 暂时跳过市值过滤（CoinGecko限速中）
  top_n: 20                    # 输出前N个结果

signal:
  min_score: 0.6               # 最低评分门槛（回测验证：高分组3d胜率69%）
  hold_days: 3                 # 建议持仓天数（回测验证：3d最优）
  stop_loss: 0.05              # 止损比例 5%
  take_profit: 0.08            # 止盈比例 8%
